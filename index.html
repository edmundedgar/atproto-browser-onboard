                    ? ' — your held key is a registered rotation key, so the identity change will be self-signed.'
                    : ' — your held key is not a registered rotation key, so the PDS will sign the identity change itself.'}</div>
                <div class="form-group">
                    <label for="handle-new-handle">new handle</label>
                    <input type="text" id="handle-new-handle" placeholder="alice.example.com">
                </div>
                <div class="form-group">
                    <label for="handle-password">password (for ${escapeHtml(handleState.pds)})</label>
                    <input type="password" id="handle-password" placeholder="Account password">
                </div>
                <div class="form-button-group">
                    <button type="button" class="submit-btn" id="handle-change-btn">Change handle</button>
                </div>
                <div id="handle-change-status"></div>
            `;
            handleContentDiv.appendChild(section);
            document.getElementById('handle-change-btn').addEventListener('click', runHandleChange);
        }

        async function runHandleChange() {
            const status = document.getElementById('handle-change-status');
            const newHandle = document.getElementById('handle-new-handle').value.trim();
            const password = document.getElementById('handle-password').value;

            if (!newHandle) {
                status.innerHTML = migrateStatusBlock('error', 'Enter the new handle.');
                return;
            }
            if (newHandle === handleState.handle) {
                status.innerHTML = migrateStatusBlock('error', 'That is already the current handle.');
                return;
            }
            if (!password) {
                status.innerHTML = migrateStatusBlock('error', 'Enter the account password.');
                return;
            }

            status.innerHTML = migrateStatusBlock('loading', 'Submitting...');
            try {
                if (handleState.heldKeyRegistered) {
                    await submitPlcUpdateForDid(handleState.did, currentKey, (didDocument) => {
                        const oldAka = `at://${handleState.handle}`;
                        const kept = (didDocument.alsoKnownAs || []).filter((aka) => aka !== oldAka);
                        return { alsoKnownAs: [...kept, `at://${newHandle}`] };
                    });
                }

                status.innerHTML = migrateStatusBlock('loading', 'Signing in to update the PDS record...');
                const login = await tryLoginToExistingAccount(handleState.pds, handleState.did, password);
                if (!login.success) {
                    throw new Error("That password didn't work for this account.");
                }

                status.innerHTML = migrateStatusBlock('loading', 'Updating handle on the PDS...');
                try {
                    await callUpdateHandle(handleState.pds, login.result.accessJwt, newHandle);
                } catch (error) {
                    if (!handleState.heldKeyRegistered || !isHandleUpdateSignatureFailure(error.message)) {
                        throw error;
                    }
                    status.innerHTML = migrateStatusBlock('loading', 'Updating handle (temporary workaround)...');
                    const creds = await getRecommendedDidCredentials(handleState.pds, login.result.accessJwt);
                    const pdsRotationKey = creds.rotationKeys?.find((k) => k !== currentDidKey);
                    if (!pdsRotationKey) {
                        throw new Error(`${error.message} (and could not determine the PDS's rotation key to work around it)`);
                    }
                    await updateHandleWithTemporaryPdsRotationKey(
                        handleState.pds, login.result.accessJwt, handleState.did, currentDidKey, pdsRotationKey, currentKey, newHandle
                    );
                }

                // Refresh by the DID we already have, not by re-resolving the
                // new handle - DNS/resolver propagation for a handle that
                // only just changed can lag behind the change itself by a
                // few seconds even though it already fully landed on both
                // plc.directory and the PDS.
                const { didDocument: freshDoc } = await fetchDidPlcRecord(handleState.did);
                handleState.handle = newHandle;
                handleState.didDocument = freshDoc;
                handleState.heldKeyRegistered = !!currentDidKey && (freshDoc.rotationKeys || []).includes(currentDidKey);
                document.getElementById('handle-current-handle').value = newHandle;

                // renderHandleChangeSection() rebuilds the whole section,
                // including this status div - set its message after
                // rebuilding, not before, or the fresh (empty) div replaces
                // the one we just wrote to.
                renderHandleChangeSection();
                document.getElementById('handle-change-status').innerHTML = migrateStatusBlock('success', `Handle changed to ${newHandle}.`);
            } catch (error) {
                status.innerHTML = migrateStatusBlock('error', error.message);
            }
        }

        const handleLookupBtn = document.getElementById('handle-lookup-btn');
        if (handleLookupBtn) handleLookupBtn.addEventListener('click', loadHandleAccountState);

        // Tab switching functionality
        function switchTab(tabName) {
            // Check if tab is inactive and trying to switch to it
            const tabButton = document.getElementById(tabName + '-tab');
            if (tabButton && tabButton.classList.contains('inactive')) {
                console.log('Tab is inactive. Please generate or load a key first.');
                return;
            }
            
            // Hide all tab panes
            document.querySelectorAll('.tab-pane').forEach(pane => {
                pane.classList.remove('active');
            });
            
            // Remove active class from all tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            // Show selected tab pane
            document.getElementById(tabName + '-pane').classList.add('active');
            
            // Add active class to selected tab button
            document.getElementById(tabName + '-tab').classList.add('active');
        }

        // Add tab event listeners
        const keygenTab = document.getElementById('keygen-tab');
        const createaccountTab = document.getElementById('createaccount-tab');
        const controlTab = document.getElementById('control-tab');
        const migrateTab = document.getElementById('migrate-tab');
        const handleTab = document.getElementById('handle-tab');

        if (keygenTab) keygenTab.addEventListener('click', () => switchTab('keygen'));
        if (createaccountTab) createaccountTab.addEventListener('click', () => switchTab('createaccount'));
        if (controlTab) controlTab.addEventListener('click', () => switchTab('control'));
        if (migrateTab) migrateTab.addEventListener('click', () => switchTab('migrate'));
        if (handleTab) handleTab.addEventListener('click', () => switchTab('handle'));

        // Initialize tab states on page load
        updateTabStates();
        
        // Initialize key generation sections visibility
        toggleKeyGenerationSections();

        // Function to update tab states based on whether a key is available
        // and, for a freshly generated key, whether its seed phrase has been
        // confirmed written down.
        function updateTabStates() {
            const unlocked = currentKey !== null && seedPhraseConfirmed;
            const createAccountTab = document.getElementById('createaccount-tab');
            const controlTab = document.getElementById('control-tab');
            const migrateTab = document.getElementById('migrate-tab');
            const handleTab = document.getElementById('handle-tab');

            if (unlocked) {
                // Remove inactive class if key is available
                if (createAccountTab) createAccountTab.classList.remove('inactive');
                if (controlTab) controlTab.classList.remove('inactive');
                if (migrateTab) migrateTab.classList.remove('inactive');
                if (handleTab) handleTab.classList.remove('inactive');
            } else {
                // Add inactive class if no key is available
                if (createAccountTab) createAccountTab.classList.add('inactive');
                if (controlTab) controlTab.classList.add('inactive');
                if (migrateTab) migrateTab.classList.add('inactive');
                if (handleTab) handleTab.classList.add('inactive');
            }
        }

        // Function to toggle key generation sections visibility
        function toggleKeyGenerationSections() {
            const hasKey = currentKey !== null;
            const keyGenerationSection = document.getElementById('keyGenerationSection');
            const clearKeySection = document.getElementById('clearKeySection');
            
            if (hasKey) {
                // Hide key generation section, show clear button
                if (keyGenerationSection) keyGenerationSection.style.display = 'none';
                if (clearKeySection) clearKeySection.style.display = 'flex';
            } else {
                // Show key generation section, hide clear button
                if (keyGenerationSection) keyGenerationSection.style.display = 'block';
                if (clearKeySection) clearKeySection.style.display = 'none';
            }
        }

        // Function to clear current key
        function clearCurrentKey() {
            currentKey = null;
            currentMnemonic = null;
            currentPublicKey = null;
            currentDidKey = null;
            
            // Hide displays
            const didKeyDisplay = document.getElementById('didKeyDisplay');
            const mnemonicDisplay = document.getElementById('mnemonicDisplay');
            const confirmSeedSection = document.getElementById('confirmSeedSection');

            if (didKeyDisplay) didKeyDisplay.style.display = 'none';
            if (mnemonicDisplay) mnemonicDisplay.style.display = 'none';
            if (confirmSeedSection) confirmSeedSection.style.display = 'none';
            seedPhraseConfirmed = true;
            
            // Clear mnemonic input
            const mnemonicInput = document.getElementById('mnemonicInput');
            if (mnemonicInput) mnemonicInput.value = '';
            
            // Update UI
            toggleKeyGenerationSections();
            updateTabStates();
            
            // Clear status
            const status = getCurrentStatusElement();
            if (status) status.innerHTML = '';
        }

        // Live-check the social import fields as the user types: fetches the
        // profile (without writing anything) and reports found/not-found so
        // typos surface before account creation instead of after.
        const socialImportPlatform = document.getElementById('social-import-platform');
        const socialImportUsername = document.getElementById('social-import-username');
        const socialImportCheckStatus = document.getElementById('social-import-check-status');
        const socialImportDefaultHelp = socialImportCheckStatus?.textContent || '';
        let socialImportCheckTimeout;
        let socialImportCheckSeq = 0;

        async function checkSocialImport() {
            if (!socialImportCheckStatus) return;
            const username = socialImportUsername.value.trim();
            if (!username) {
                socialImportCheckStatus.textContent = socialImportDefaultHelp;
                socialImportCheckStatus.style.color = '';
                return;
            }
            const seq = ++socialImportCheckSeq;
            socialImportCheckStatus.textContent = 'Checking...';
            socialImportCheckStatus.style.color = '#a0a0a0';
            try {
                const profile = await fetchSocialProfile(socialImportPlatform.value, username);
                if (seq !== socialImportCheckSeq) return;
                socialImportCheckStatus.textContent = `Found: ${profile.bio || '(no bio set)'}`;
                socialImportCheckStatus.style.color = '#00ff88';
            } catch (error) {
                if (seq !== socialImportCheckSeq) return;
                socialImportCheckStatus.textContent = `Not found: ${error.message}`;
                socialImportCheckStatus.style.color = '#ff4444';
            }
        }

        if (socialImportUsername) {
            socialImportUsername.addEventListener('input', () => {
                clearTimeout(socialImportCheckTimeout);
                socialImportCheckTimeout = setTimeout(checkSocialImport, 600);
            });
        }
        if (socialImportPlatform) {
            socialImportPlatform.addEventListener('change', checkSocialImport);
        }

        // Update domain select dropdown with availableUserDomains from PDS
        // Guards against overlapping calls (e.g. debounced input firing just
        // before blur) clobbering each other's result - only the most recent
        // call is allowed to actually write to the select.
        let domainSelectRequestId = 0;

        async function updateDomainSelect(pdsEndpoint) {
            const domainSelect = document.getElementById('account-handle-domain');
            if (!domainSelect) return;

            const requestId = ++domainSelectRequestId;
            const currentSelection = domainSelect.value;

            domainSelect.innerHTML = '<option value="">Select domain...</option>';

            if (!pdsEndpoint || !pdsEndpoint.trim()) {
                return;
            }

            let availableDomains = [];
            let placeholderText = null;
            try {
                const serverInfo = await getPdsServerInfo(pdsEndpoint.trim());
                availableDomains = serverInfo.availableUserDomains || [];
                if (availableDomains.length === 0) {
                    placeholderText = 'No domains available';
                }
                console.log('Updated domain select with domains:', availableDomains);
            } catch (error) {
                console.error('Error fetching available domains:', error);
                placeholderText = 'Error loading domains';
            }

            // A newer call has started since ours began - its result should
            // win, so leave the select alone.
            if (requestId !== domainSelectRequestId) return;

            // Replace (not append to) the initial placeholder option, so an
            // error/empty state doesn't leave two value="" options behind.
            const firstOption = domainSelect.firstElementChild;
            if (placeholderText) {
                firstOption.textContent = placeholderText;
                firstOption.disabled = true;
            } else {
                availableDomains.forEach(domain => {
                    const option = document.createElement('option');
                    option.value = domain;
                    option.textContent = domain;
                    domainSelect.appendChild(option);
                });
            }

            // Always add .eth.link as an option, even on error/no-domains.
            const ethLinkOption = document.createElement('option');
            ethLinkOption.value = '.eth.link';
            ethLinkOption.textContent = '.eth.link';
            domainSelect.appendChild(ethLinkOption);

            // Restore selection if it was .eth.link
            if (currentSelection === '.eth.link') {
                domainSelect.value = '.eth.link';
            }

            // Trigger change event to update UI state (if function is defined)
            if (typeof handleDomainChange === 'function') {
                handleDomainChange();
            }
        }
        
        // Add event listener to PDS endpoint input to update domain select and DID
        const pdsEndpointInput = document.getElementById('pds-endpoint');
        if (pdsEndpointInput) {
            let updateTimeout;
            pdsEndpointInput.addEventListener('input', function() {
                // Debounce the update to avoid too many requests
                clearTimeout(updateTimeout);
                updateTimeout = setTimeout(() => {
                    updateDomainSelect(normalizePdsEndpoint(this.value));
                    updateDidDisplay();
                }, 500);
            });

            // Also update on blur (when user leaves the field). The scheme
            // is normalized only for this internal lookup - never written
            // back into the field, so the user never sees https:// appear.
            pdsEndpointInput.addEventListener('blur', function() {
                clearTimeout(updateTimeout);
                updateDomainSelect(normalizePdsEndpoint(this.value));
                updateDidDisplay();
            });

            // Check if PDS endpoint already has a value on page load
            if (pdsEndpointInput.value && pdsEndpointInput.value.trim()) {
                updateDomainSelect(normalizePdsEndpoint(pdsEndpointInput.value));
            }
        }
        
        // Handle domain selection changes for .eth.link
        const domainSelect = document.getElementById('account-handle-domain');
        const setupEthGroup = document.getElementById('setup-eth-group');
        const setupEthBtn = document.getElementById('setup-eth-btn');
        const submitCreateAccountBtn = document.getElementById('submit-createaccount-btn');
        
        function handleDomainChange() {
            const selectedDomain = domainSelect.value;
            const isEthLink = selectedDomain === '.eth.link';
            
            if (isEthLink) {
                // Show "Set up .eth" button and disable Create Account
                if (setupEthGroup) {
                    setupEthGroup.style.display = 'block';
                    // Reset to button (in case it was changed to success message)
                    if (!setupEthGroup.querySelector('button')) {
                        setupEthGroup.innerHTML = '<button type="button" class="submit-btn" id="setup-eth-btn">Set up .eth</button>';
                        const btn = document.getElementById('setup-eth-btn');
                        if (btn) {
                            btn.addEventListener('click', setupEth);
                        }
                    }
                }
                if (submitCreateAccountBtn) submitCreateAccountBtn.disabled = true;
            } else {
                // Hide "Set up .eth" button and enable Create Account
                if (setupEthGroup) setupEthGroup.style.display = 'none';
                if (submitCreateAccountBtn) submitCreateAccountBtn.disabled = false;
            }
        }
        
        if (domainSelect) {
            domainSelect.addEventListener('change', handleDomainChange);
        }
        
        // Variables for .eth.link polling
        let ethLinkPollInterval = null;
        let expectedEthLinkDid = null;
        
        // Function to stop polling
        function stopEthLinkPolling() {
            if (ethLinkPollInterval) {
                clearInterval(ethLinkPollInterval);
                ethLinkPollInterval = null;
            }
            expectedEthLinkDid = null;
        }
        
        // Function to poll .well-known/atproto-did/ for .eth.link domain via proxy server
        async function pollEthLinkDid(domain, expectedDid) {
            try {
                // Strip .link suffix if present (server expects .eth, not .eth.link)
                const domainForServer = domain.endsWith('.link') ? domain.slice(0, -5) : domain;
                // Use the proxy server instead of direct gateway access
                const url = `https://ens.goat.navy/atproto-did/${domainForServer}`;
                const response = await fetch(url);
                
                if (response.ok) {
                    const result = await response.json();
                    
                    // Check if the server found the DID and it matches
                    if (result.success && result.did === expectedDid) {
                        // Found the expected DID - stop polling and update UI
                        stopEthLinkPolling();
                        
                        // Replace button with success message
                        if (setupEthGroup) {
                            setupEthGroup.innerHTML = '<div style="color: #28a745; font-weight: bold; padding: 12px;">.eth.link address ready</div>';
                        }
                        
                        // Enable Create Account button
                        if (submitCreateAccountBtn) {
                            submitCreateAccountBtn.disabled = false;
                        }
                        
                        console.log('Found expected DID at .eth.link domain:', result.did);
                        return true;
                    } else if (result.success && result.did !== expectedDid) {
                        // DID found but doesn't match - log for debugging
                        console.log('DID found but does not match expected:', result.did, 'expected:', expectedDid);
                    } else if (!result.success) {
                        // Server returned an error - log it but continue polling
                        console.log('Server error while polling:', result.error, 'errorType:', result.errorType);
                    }
                }
            } catch (error) {
                // Silently fail - will retry on next poll
                console.log('Polling .eth.link DID (not found yet):', error.message);
            }
            return false;
        }
        
        // Function to start polling for .eth.link DID
        function startEthLinkPolling() {
            // Stop any existing polling
            stopEthLinkPolling();
            
            // Calculate expected DID from form data
            const form = document.getElementById('createaccount-form');
            if (!form) return;
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            const subdomain = data.handleSubdomain?.trim() || '';
            const domain = data.handleDomain?.trim() || '';
            
            if (!subdomain || !domain || domain !== '.eth.link') {
                return;
            }
            
            // Only proceed if we have a private key
            if (!currentKey) {
                return;
            }
            
            // Combine subdomain and domain into full handle
            const handle = `${subdomain}${domain}`; // domain already starts with .
            const fullDomain = handle; // e.g., "bot.reality.eth.link"
            
            // Calculate expected DID
            (async () => {
                try {
                    const initialOperation = createDidPlcInitialOperation({
                        ...data,
                        handle: handle
                    }, currentDidKey);
                    
                    const signedInitialOperation = await signDidPlcOperation(initialOperation, currentKey);
                    const didPlcId = await generateDidPlcId(signedInitialOperation);
                    
                    expectedEthLinkDid = didPlcId;
                    
                    // Start polling every 15 seconds
                    ethLinkPollInterval = setInterval(async () => {
                        await pollEthLinkDid(fullDomain, expectedEthLinkDid);
                    }, 15000);
                    
                    // Poll immediately
                    await pollEthLinkDid(fullDomain, expectedEthLinkDid);
                    
                } catch (error) {
                    console.error('Error calculating DID for polling:', error);
                }
            })();
        }
        
        // Update handleDomainChange to start polling
        const originalHandleDomainChange = handleDomainChange;
        handleDomainChange = function() {
            originalHandleDomainChange();
            const selectedDomain = domainSelect.value;
            const isEthLink = selectedDomain === '.eth.link';
            
            if (isEthLink) {
                // Start polling for .eth.link DID
                startEthLinkPolling();
            } else {
                // Stop polling
                stopEthLinkPolling();
            }
        };
        
        // Function to calculate DID and open eth.html
        async function setupEth() {
            // Check if a private key has been generated or loaded
            if (!currentKey) {
                const status = getCurrentStatusElement();
                if (status) {
                    status.innerHTML = '<div class="status error">no key loaded — generate or restore one on the key tab first</div>';
                }
                return;
            }
            
            const form = document.getElementById('createaccount-form');
            if (!form) return;
            
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());
            
            // Combine subdomain and domain into full handle
            const subdomain = data.handleSubdomain?.trim() || '';
            const domain = data.handleDomain?.trim() || '';
            if (!subdomain || !domain) {
                const status = getCurrentStatusElement();
                if (status) {
                    status.innerHTML = '<div class="status error">enter a handle and choose a domain</div>';
                }
                return;
            }
            
            // Only add dot if domain doesn't already start with one
            const handle = domain.startsWith('.') ? `${subdomain}${domain}` : `${subdomain}.${domain}`;
            
            // For .eth.link, strip .link to get just .eth for the account name parameter
            let accountName = handle;
            if (domain.endsWith('.link')) {
                const domainWithoutLink = domain.slice(0, -5); // Remove '.link'
                accountName = domainWithoutLink.startsWith('.') ? `${subdomain}${domainWithoutLink}` : `${subdomain}.${domainWithoutLink}`;
            }
            
            try {
                // Create initial DID:PLC operation
                const initialOperation = createDidPlcInitialOperation({
                    ...data,
                    handle: handle
                }, currentDidKey);
                
                // Sign the operation
                const signedInitialOperation = await signDidPlcOperation(initialOperation, currentKey);
                
                // Generate DID:PLC ID from the signed operation
                const didPlcId = await generateDidPlcId(signedInitialOperation);
                
                // Open eth.html in a new window with the DID and account name as parameters
                const ethUrl = `eth.html?did=${encodeURIComponent(didPlcId)}&account=${encodeURIComponent(accountName)}`;
                window.open(ethUrl, '_blank');
                
            } catch (error) {
                console.error('Error calculating DID for .eth setup:', error);
                const status = getCurrentStatusElement();
                if (status) {
                    status.innerHTML = `<div class="status error">couldn't calculate DID: ${error.message}</div>`;
                }
            }
        }
        
        // Add event listener for setup-eth-btn
        if (setupEthBtn) {
            setupEthBtn.addEventListener('click', setupEth);
        }
        
        // Function to calculate and update DID display
        // The scheme is optional in the hosting-server field - default to
        // https rather than making the user type it.
        function normalizePdsEndpoint(value) {
            const trimmed = (value || '').trim();
            if (!trimmed || /^https?:\/\//i.test(trimmed)) return trimmed;
            return `https://${trimmed}`;
        }

        async function updateDidDisplay() {
            // Only update if we have a private key
            if (!currentKey || !currentDidKey) {
                return;
            }

            const form = document.getElementById('createaccount-form');
            if (!form) return;

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            const subdomain = data.handleSubdomain?.trim() || '';
            const domain = data.handleDomain?.trim() || '';
            const pdsEndpoint = normalizePdsEndpoint(data.pdsEndpoint);
            
            // Need at least subdomain, domain, and PDS endpoint to calculate DID
            if (!subdomain || !domain || !pdsEndpoint) {
                const didValueField = document.getElementById('account-did-value');
                if (didValueField) {
                    didValueField.value = '';
                }
                setHeaderIdleContent('<span class="status-idle">did:plc:...</span>');
                return;
            }

            try {
                // Combine subdomain and domain into full handle
                const handle = domain.startsWith('.') ? `${subdomain}${domain}` : `${subdomain}.${domain}`;

                // Create initial DID:PLC operation
                const initialOperation = createDidPlcInitialOperation({
                    ...data,
                    handle: handle,
                    pdsEndpoint: pdsEndpoint
                }, currentDidKey);

                // Sign the operation
                const signedInitialOperation = await signDidPlcOperation(initialOperation, currentKey);

                // Generate DID:PLC ID from the signed operation
                const didPlcId = await generateDidPlcId(signedInitialOperation);

                // Update the display
                const didValueField = document.getElementById('account-did-value');
                if (didValueField) {
                    didValueField.value = didPlcId;
                }
                setHeaderIdleContent(`<span class="status-idle">${didPlcId}</span>`);
            } catch (error) {
                console.error('Error calculating DID for display:', error);
                const didValueField = document.getElementById('account-did-value');
                if (didValueField) {
                    didValueField.value = '';
                }
                setHeaderIdleContent('<span class="status-idle">could not calculate DID</span>');
            }
        }
        
        // Also listen for input changes on subdomain to restart polling and update DID
        const handleSubdomainInput = document.getElementById('account-handle-subdomain');
        if (handleSubdomainInput) {
            let subdomainTimeout;
            handleSubdomainInput.addEventListener('input', function() {
                clearTimeout(subdomainTimeout);
                subdomainTimeout = setTimeout(() => {
                    const selectedDomain = domainSelect.value;
                    if (selectedDomain === '.eth.link') {
                        startEthLinkPolling();
                    }
                    updateDidDisplay();
                }, 500);
            });
        }
        
        // Listen for changes to domain select
        if (domainSelect) {
            domainSelect.addEventListener('change', function() {
                updateDidDisplay();
            });
        }
        
        // Create Account form handling
        const createaccountForm = document.getElementById('createaccount-form');
        if (createaccountForm) {
            createaccountForm.addEventListener('submit', async function(event) {
            event.preventDefault();

            const status = getCurrentStatusElement();

            // Check if a private key has been generated or loaded
            if (!currentKey) {
                if (status) {
                    status.innerHTML = '<div class="status error">no key loaded — generate or restore one on the key tab first</div>';
                }
                return;
            }

            const formData = new FormData(this);
            const data = Object.fromEntries(formData.entries());
            // The scheme is optional in the field itself - the user never
            // has to see or type https://, it's only added here for actual use.
            data.pdsEndpoint = normalizePdsEndpoint(data.pdsEndpoint);

            // Combine subdomain and domain into full handle
            const subdomain = data.handleSubdomain?.trim() || '';
            const domain = data.handleDomain?.trim() || '';
            if (!subdomain || !domain) {
                if (status) {
                    status.innerHTML = '<div class="status error">enter a handle and choose a domain</div>';
                }
                return;
            }
            // Only add dot if domain doesn't already start with one
            data.handle = domain.startsWith('.') ? `${subdomain}${domain}` : `${subdomain}.${domain}`;
            
            // Update the hidden handle field
            const handleField = document.getElementById('account-handle');
            if (handleField) {
                handleField.value = data.handle;
            }
            
            try {
                // Step 1: Create initial DID:PLC record with our rotation key as verificationMethod
                if (status) {
                    status.innerHTML = '<div class="status success">creating DID record...</div>';
                }
                
                console.log('Creating initial DID:PLC record with rotation key:', currentDidKey);
                
                // Create initial DID:PLC operation
                const initialOperation = createDidPlcInitialOperation(data, currentDidKey);
                
                // Sign the operation
                const signedInitialOperation = await signDidPlcOperation(initialOperation, currentKey);
                
                // Generate DID:PLC ID from the signed operation
                const didPlcId = await generateDidPlcId(signedInitialOperation);
                
                // Check if DID already exists before submitting. Only treat a
                // genuine 404 as "doesn't exist yet" - any other failure (e.g.
                // plc.directory being briefly unreachable) should stop the flow
                // rather than risk re-submitting the genesis operation for a DID
                // that may already exist for a different reason.
                let didExists = false;
                try {
                    const existingRecord = await fetchDidPlcRecord(didPlcId);
                    if (existingRecord && existingRecord.auditLog && existingRecord.auditLog.length > 0) {
                        console.log('DID:PLC record already exists, skipping submission');
                        didExists = true;
                    }
                } catch (error) {
                    if (error.status === 404) {
                        console.log('DID:PLC record does not exist yet, will create it');
                    } else {
                        throw new Error(`Could not check whether DID:PLC record already exists: ${error.message}`);
                    }
                }
                
                if (!didExists) {
                    // Submit to plc.directory to register the DID:PLC ID
                    console.log('Submitting initial DID:PLC record to plc.directory...');
                    const submitResult = await submitDidPlcOperation(signedInitialOperation, didPlcId);
                    
                    if (!submitResult.success) {
                        throw new Error('Failed to register DID:PLC record');
                    }
                    
                    console.log('DID:PLC ID registered:', didPlcId);
                } else {
                    console.log('DID:PLC ID already exists:', didPlcId);
                }
                
                // Step 2: Call createAccount while the DID doc still shows the
                // rotation key under #atproto - createAccount's service-auth JWT
                // is signed with the rotation key, and the PDS verifies it by
                // resolving whatever key #atproto currently points to.
                if (status) {
                    status.innerHTML = '<div class="status success">creating account...</div>';
                }

                console.log('Creating account with rotation key still as #atproto');

                // Check (without needing a password) whether this handle is
                // already taken on this PDS, and if so, by us or someone
                // else - a previous attempt may have already gotten this far
                // (e.g. the PDS was unreachable on a later step), in which
                // case we should reuse that account rather than create a
                // duplicate.
                const existingRepo = await checkExistingRepo(data.pdsEndpoint, data.handle);
                let accountResult;

                if (existingRepo.exists && (existingRepo.did === null || existingRepo.did === didPlcId)) {
                    accountResult = await tryLoginToExistingAccount(data.pdsEndpoint, data.handle, data.password);
                    if (!accountResult.success) {
                        throw new Error(`An account already exists for this handle with this key, but that password didn't work. Double-check it, or use ${data.pdsEndpoint}'s password reset if you've forgotten it.`);
                    }
                } else if (existingRepo.exists) {
                    throw new Error('This handle is already in use by a different account.');
                } else {
                    accountResult = await createAccountForExistingDid(
                        data.pdsEndpoint,
                        data.handle,
                        data.email,
                        data.password,
                        didPlcId,
                        data.inviteCode,
                        currentKey
                    );
                }

                console.log('Account creation result:', accountResult);

                if (!accountResult.success) {
                    throw new Error('Account creation failed');
                }

                // Step 3: Now that the account exists, ask the PDS what signing
                // key it actually holds for it - this replaces reserveSigningKey,
                // which only works before the account exists and returns a
                // different, wrong key once its original reservation has been
                // consumed (which happens as soon as createAccount succeeds, so
                // it can't be used to recover from an interrupted run either).
                if (status) {
                    status.innerHTML = '<div class="status success">fetching signing key...</div>';
                }
                const recommended = await getRecommendedDidCredentials(data.pdsEndpoint, accountResult.result.accessJwt);
                const pdsVerificationMethod = recommended?.verificationMethods?.atproto;
                if (!pdsVerificationMethod) {
                    throw new Error('PDS did not return a recommended #atproto verification method');
                }
                console.log('PDS verification method:', pdsVerificationMethod);

                // Step 4: Build and sign the DID update. Note we deliberately
                // keep initialOperation's rotationKeys (our own key only) rather
                // than using recommended.rotationKeys, which suggests including
                // the PDS's own rotation key - that's the opposite of what
                // self-custody wants; the PDS never gets a rotation key, only
                // the signing (#atproto) key it needs to serve day-to-day writes.
                if (status) {
                    status.innerHTML = '<div class="status success">preparing DID update...</div>';
                }
                const updateOperation = {
                    ...initialOperation,
                    prev: await getLastOperationCid(didPlcId),
                    verificationMethods: {
                        atproto: pdsVerificationMethod
                    }
                };
                const signedUpdate = await signDidPlcOperation(updateOperation, currentKey);
                const verificationResult = await verifyDidPlcOperation(signedUpdate);
                if (!verificationResult.success || !verificationResult.keysMatch) {
                    throw new Error('Failed to verify signed update operation');
                }

                // Step 5: Submit the update, handing #atproto over to the PDS's
                // real signing key. Skip if a previous attempt already did this -
                // getRecommendedDidCredentials always reflects the account's
                // actual current key, so on a resumed run pdsVerificationMethod
                // above already equals whatever's published, making this check
                // reliable (unlike the old reserveSigningKey-based version).
                if (status) {
                    status.innerHTML = '<div class="status success">submitting DID update...</div>';
                }
                const currentDoc = await fetchDidPlcRecord(didPlcId).catch(() => null);
                const alreadySubmitted = currentDoc?.didDocument?.verificationMethods?.atproto === pdsVerificationMethod;
                if (alreadySubmitted) {
                    console.log('DID update was already submitted in a previous attempt, skipping');
                } else {
                    const updateSubmitResult = await submitDidPlcOperation(signedUpdate, didPlcId);
                    if (!updateSubmitResult.success) {
                        // The account itself was created successfully at this point —
                        // don't repeat account creation. Retry just this update submission.
                        throw new Error('Account was created, but handing signing over to the PDS failed (DID update not submitted). Do not recreate the account — retry submitting the DID update.');
                    }
                    console.log('DID update submitted to plc.directory');
                }

                // Step 6: NOW activate the account — the DID doc finally shows
                // the PDS's key, so activateAccount's check against the actor's
                // real signing key can actually pass.
                if (status) {
                    status.innerHTML = '<div class="status success">activating account...</div>';
                }
                let activateResult = await activateAccountAfterDidUpdate(data.pdsEndpoint, accountResult.result.accessJwt);

                if (!activateResult.success && isRotationKeyCheckFailure(activateResult.error)) {
                    if (status) {
                        status.innerHTML = '<div class="status success">activating account (temporary workaround)...</div>';
                    }
                    const pdsRotationKey = recommended?.rotationKeys?.find((k) => k !== currentDidKey);
                    if (!pdsRotationKey) {
                        throw new Error('Activation failed and could not determine the PDS\'s rotation key to work around it');
                    }
                    activateResult = await activateWithTemporaryPdsRotationKey(
                        data.pdsEndpoint,
                        accountResult.result.accessJwt,
                        didPlcId,
                        currentDidKey,
                        pdsRotationKey,
                        currentKey
                    );
                }

                // Update the DID:PLC field in the form
                const didValueField = document.getElementById('account-did-value');
                if (didValueField) {
                    didValueField.value = didPlcId;
                }
                setHeaderIdleContent(`<span class="status-idle">${didPlcId}</span>`);

                if (status) {
                    status.innerHTML = '<div class="status success">account created</div>';
                }

                // Runs after the account is already fully created and activated,
                // so failures here must not surface as account-creation errors -
                // hence its own try/catch instead of joining the one above. Both
                // steps fold into a single final status line rather than piling
                // up separate messages, since the header only has room for a
                // line or two - full failure detail still goes to the console.
                let bootstrapNote = '';
                try {
                    const bootstrapSummary = await runBootstrap(data.pdsEndpoint, accountResult.result.accessJwt, didPlcId);
                    if (bootstrapSummary) {
                        const parts = [];
                        if (bootstrapSummary.followTotal) parts.push(`${bootstrapSummary.followed}/${bootstrapSummary.followTotal} follows`);
                        if (bootstrapSummary.blockTotal) parts.push(`${bootstrapSummary.blocked}/${bootstrapSummary.blockTotal} blocklists`);
                        if (bootstrapSummary.feedTotal) parts.push(`${bootstrapSummary.feedsAdded}/${bootstrapSummary.feedTotal} feeds`);
                        bootstrapNote = parts.join(', ');
                        if (bootstrapSummary.failures.length) {
                            console.warn('Bootstrap failures:', bootstrapSummary.failures);
                        }
                    }
                } catch (error) {
                    console.error('Error bootstrapping account:', error);
                    bootstrapNote = 'bootstrap failed';
                }

                const socialUsername = data.socialUsername?.trim();
                let importNote = '';
                if (socialUsername) {
                    try {
                        await importSocialProfile(data.pdsEndpoint, accountResult.result.accessJwt, didPlcId, data.socialPlatform, socialUsername);
                        importNote = 'profile imported';
                    } catch (error) {
                        console.error('Error importing social profile:', error);
                        importNote = 'profile import failed';
                    }
                }

                if (status) {
                    const extras = [bootstrapNote, importNote].filter(Boolean).join(' · ');
                    status.innerHTML = extras
                        ? `<div class="status success">account created — ${extras}</div>`
                        : '<div class="status success">account created</div>';
                }
            } catch (error) {
                console.error('Error creating account:', error);
                if (status) {
                    status.innerHTML = `<div class="status error">couldn't create account: ${error.message}</div>`;
                }
            }
        });
        }

        const clearCreateaccountBtn = document.getElementById('clear-createaccount-btn');
        const copyCreateaccountResultBtn = document.getElementById('copy-createaccount-result-btn');
        
        if (clearCreateaccountBtn) {
            clearCreateaccountBtn.addEventListener('click', function() {
                const createaccountForm = document.getElementById('createaccount-form');
                const createaccountResult = document.getElementById('createaccount-result');
                if (createaccountForm) createaccountForm.reset();
                // Reset domain select to placeholder
                const domainSelect = document.getElementById('account-handle-domain');
                if (domainSelect) {
                    domainSelect.innerHTML = '<option value="">Select domain...</option>';
                    // Stop polling
                    stopEthLinkPolling();
                    // Trigger change event to reset UI state
                    handleDomainChange();
                }
                if (createaccountResult) createaccountResult.style.display = 'none';
                const status = getCurrentStatusElement();
                if (status) {
                    status.innerHTML = '';
                }
            });
        }

        if (copyCreateaccountResultBtn) {
            copyCreateaccountResultBtn.addEventListener('click', function() {
                // TODO: Implement copy functionality
                console.log('Copy account details clicked');
            });
        }

        // Check if Web Crypto API is available
        if (!window.crypto || !window.crypto.getRandomValues) {
            const keyDisplay = document.getElementById('keyDisplay');
            const generateBtn = document.getElementById('generateBtn');
            if (keyDisplay) keyDisplay.textContent = 'Web Crypto API not supported in this browser';
            if (generateBtn) generateBtn.disabled = true;
        }

        // Run test case on page load
        testDidPlcIdGeneration();
    </script>
</body>
</html>
