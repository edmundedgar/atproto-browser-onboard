<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATProto Self-Sovereign Account Creator</title>
    <link rel="icon" href="data:,">
    <style>
        :root {
            --bg: #15161b;
            --panel: #1b1d24;
            --panel-raised: #21232b;
            --text: #e7e4dc;
            --text-dim: #8d8f9b;
            --hairline: #303240;
            --amber: #d4a24c;
            --amber-bright: #eab766;
            --ok: #9cbf8e;
            --bad: #c07b6e;
            --shadow: rgba(0, 0, 0, 0.5);
        }
        :root[data-theme="light"] {
            --bg: #f3f1ea;
            --panel: #fbfaf5;
            --panel-raised: #ffffff;
            --text: #23232a;
            --text-dim: #6c6c78;
            --hairline: #dcd8ca;
            --amber: #9c6d1f;
            --amber-bright: #7d5717;
            --ok: #2e6b3e;
            --bad: #a8402e;
            --shadow: rgba(30, 25, 10, 0.1);
        }
        @media (prefers-color-scheme: light) {
            :root:not([data-theme="dark"]) {
                --bg: #f3f1ea;
                --panel: #fbfaf5;
                --panel-raised: #ffffff;
                --text: #23232a;
                --text-dim: #6c6c78;
                --hairline: #dcd8ca;
                --amber: #9c6d1f;
                --amber-bright: #7d5717;
                --ok: #2e6b3e;
                --bad: #a8402e;
                --shadow: rgba(30, 25, 10, 0.1);
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 56px 20px;
            color: var(--text);
            line-height: 1.6;
        }

        .container {
            padding: 0;
            max-width: 700px;
            width: 100%;
            text-align: left;
            background: var(--panel);
            border: 1px solid var(--hairline);
            border-radius: 8px;
            box-shadow: 0 30px 70px var(--shadow);
            zoom: 1.25;
        }

        .header-slot {
            padding: 44px 48px 26px;
            font-size: 14px;
            line-height: 1.6;
            min-height: 3.2em;
        }
        .path {
            font-family: ui-monospace, 'SF Mono', Consolas, monospace;
            color: var(--text-dim);
        }
        .path .amber { color: var(--amber); }
        #status-line {
            transition: opacity 0.8s ease;
        }
        .status-idle {
            color: var(--text-dim);
        }
        @media (prefers-reduced-motion: reduce) {
            #status-line {
                transition: none;
            }
        }

        .key-display {
            border: 1px solid var(--hairline);
            border-radius: 6px;
            padding: 16px 18px;
            margin: 0 0 16px;
            word-break: break-all;
            font-family: ui-monospace, 'SF Mono', Consolas, monospace;
            font-size: 13.5px;
            line-height: 1.7;
            color: var(--text-dim);
            background: var(--panel-raised);
        }

        .key-display.has-key {
            color: var(--amber);
        }

        .generate-btn {
            appearance: none;
            border: 1px solid var(--text);
            background: var(--text);
            color: var(--bg);
            font-weight: 600;
            font-size: 15px;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .generate-btn:hover {
            opacity: 0.82;
        }

        .generate-btn:active {
            opacity: 0.7;
        }

        .copy-btn {
            appearance: none;
            border: 1px solid var(--hairline);
            background: transparent;
            color: var(--text-dim);
            font-size: 13px;
            padding: 9px 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: color 0.15s ease, border-color 0.15s ease;
        }

        .copy-btn:hover {
            color: var(--amber);
            border-color: var(--text-dim);
        }

        .copy-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .mnemonic-display {
            border: 1px solid var(--hairline);
            border-radius: 6px;
            padding: 16px 18px;
            margin: 0 0 16px;
            background: var(--panel-raised);
        }

        .mnemonic-display h3 {
            color: var(--text-dim);
            margin-bottom: 0;
            font-family: ui-monospace, monospace;
            font-size: 12px;
            font-weight: 500;
            text-transform: none;
            letter-spacing: normal;
        }

        .mnemonic-text {
            font-family: ui-monospace, 'SF Mono', Consolas, monospace;
            font-size: 14px;
            line-height: 1.8;
            color: var(--amber);
            word-break: break-word;
        }

        .did-key-display {
            border: 1px solid var(--hairline);
            border-radius: 6px;
            padding: 16px 18px;
            margin: 0 0 16px;
            background: var(--panel-raised);
        }

        .did-key-display h3 {
            color: var(--text-dim);
            margin-bottom: 0;
            font-family: ui-monospace, monospace;
            font-size: 12px;
            font-weight: 500;
            text-transform: none;
            letter-spacing: normal;
        }

        .did-key-text {
            font-family: ui-monospace, 'SF Mono', Consolas, monospace;
            font-size: 13.5px;
            line-height: 1.7;
            color: var(--amber);
            word-break: break-all;
        }

        .box-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }

        .copy-icon {
            flex: 0 0 auto;
            background: none;
            border: none;
            color: var(--text-dim);
            font-size: 15px;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            transition: color 0.15s ease;
        }

        .copy-icon:hover {
            color: var(--amber);
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 0 0 20px;
        }

        .restore-section {
            border-top: 1px solid var(--hairline);
            padding-top: 26px;
            margin: 30px 0 0;
        }

        .restore-section h3 {
            color: var(--text-dim);
            margin-bottom: 12px;
            font-family: ui-monospace, monospace;
            font-size: 12px;
            font-weight: 500;
            text-transform: none;
            letter-spacing: normal;
        }

        .mnemonic-input-container {
            margin: 0 0 14px;
        }

        .mnemonic-input-container textarea {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid var(--hairline);
            border-radius: 6px;
            font-family: ui-monospace, 'SF Mono', Consolas, monospace;
            font-size: 14px;
            line-height: 1.5;
            resize: vertical;
            background: var(--panel);
            color: var(--text);
        }

        .mnemonic-input-container textarea:focus {
            outline: none;
            border-color: var(--amber);
        }

        .restore-button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .restore-btn {
            appearance: none;
            border: 1px solid var(--hairline);
            background: transparent;
            color: var(--text-dim);
            padding: 11px 20px;
            font-size: 14.5px;
            border-radius: 6px;
            cursor: pointer;
            transition: color 0.15s ease, border-color 0.15s ease;
        }

        .restore-btn:hover {
            color: var(--text);
            border-color: var(--text-dim);
        }

        .restore-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .clear-btn {
            appearance: none;
            border: 1px solid var(--hairline);
            background: transparent;
            color: var(--text-dim);
            padding: 11px 20px;
            font-size: 14.5px;
            border-radius: 6px;
            cursor: pointer;
            transition: color 0.15s ease, border-color 0.15s ease;
        }

        .clear-btn:hover {
            color: var(--bad);
            border-color: var(--bad);
        }

        .key-generation-section {
            display: block;
        }

        .clear-key-section {
            display: flex;
            margin: 20px 0;
        }

        .confirm-seed-section {
            display: flex;
            margin: 0 0 16px;
        }
        .confirm-seed-section .generate-btn {
            text-align: center;
            line-height: 1.4;
        }

        .info {
            background: var(--panel-raised);
            border: 1px solid var(--hairline);
            border-left: 3px solid var(--amber);
            padding: 15px;
            margin: 20px 0;
            border-radius: 6px;
            text-align: left;
        }

        .info h3 {
            color: var(--text);
            margin-bottom: 10px;
        }

        .info p {
            color: var(--text-dim);
            line-height: 1.6;
        }

        .status {
            display: inline;
            margin: 0;
            padding: 0;
            border-radius: 0;
            font-weight: 500;
            font-size: inherit;
            font-family: inherit;
        }

        .status.success {
            background: none;
            color: var(--ok);
            border: none;
        }

        .status.error {
            background: none;
            color: var(--bad);
            border: none;
        }

        /* Tab Navigation Styles */
        .tab-navigation {
            display: flex;
            gap: 4px;
            padding: 0 48px;
            border-bottom: 1px solid var(--hairline);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab-btn {
            appearance: none;
            background: transparent;
            border: none;
            font-family: ui-monospace, 'SF Mono', Consolas, monospace;
            padding: 12px 4px 14px;
            margin-right: 26px;
            font-size: 13.5px;
            color: var(--text-dim);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: color 0.15s ease;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .tab-btn::before { content: "# "; opacity: 0.5; }

        .tab-btn:hover {
            color: var(--text);
        }

        .tab-btn.active {
            color: var(--text);
            border-bottom-color: var(--amber);
        }

        .tab-btn.inactive {
            color: var(--text-dim);
            cursor: not-allowed;
            opacity: 0.4;
        }

        .tab-btn.inactive:hover {
            color: var(--text-dim);
        }

        .tab-btn:focus-visible {
            outline: 2px solid var(--amber);
            outline-offset: 2px;
        }

        .tab-content {
            position: relative;
        }

        .tab-pane {
            display: none;
            padding: 32px 48px 48px;
        }

        .tab-pane.active {
            display: block;
        }

        /* DID:PLC Form Styles */
        .plc-form-container {
            max-width: 100%;
            margin: 0;
            padding: 0;
        }

        .plc-form-container h2 {
            color: var(--text);
            text-align: left;
            margin-bottom: 6px;
            font-size: 1.1em;
            font-weight: 600;
            letter-spacing: normal;
        }

        .plc-form {
            padding: 0;
            border-radius: 0;
            border: none;
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 8px;
            font-size: 12.5px;
            font-family: ui-monospace, monospace;
            text-transform: none;
            letter-spacing: normal;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 11px 13px;
            border: 1px solid var(--hairline);
            border-radius: 6px;
            font-size: 15.5px;
            font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
            transition: border-color 0.15s ease;
            box-sizing: border-box;
            background: var(--panel);
            color: var(--text);
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: var(--text-dim);
        }

        .form-group select:invalid {
            color: var(--text-dim);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--amber);
        }

        .social-import-group {
            display: flex;
            gap: 10px;
        }

        .social-import-group select {
            width: auto;
            flex: 0 0 auto;
            padding: 8px 10px;
            font-size: 14px;
        }

        .social-import-group input {
            flex: 1;
            padding: 8px 10px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 70px;
            font-family: ui-monospace, monospace;
        }

        .form-help {
            display: block;
            color: var(--text-dim);
            font-size: 13.5px;
            margin-top: 7px;
            font-style: normal;
        }

        .form-button-group {
            display: flex;
            gap: 12px;
            margin-top: 26px;
            flex-wrap: wrap;
        }

        .submit-btn {
            appearance: none;
            border: 1px solid var(--text);
            background: var(--text);
            color: var(--bg);
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s ease;
        }

        .submit-btn:hover {
            opacity: 0.82;
        }

        .submit-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .submit-btn:disabled:hover {
            opacity: 0.4;
        }

        .plc-result {
            background: var(--panel-raised);
            border: 1px solid var(--hairline);
            border-radius: 8px;
            padding: 22px 24px;
            margin-top: 26px;
            text-align: left;
        }

        .plc-result h3 {
            color: var(--ok);
            margin-bottom: 14px;
            font-size: 15px;
            font-weight: 600;
        }

        .plc-result-content {
            background: var(--panel);
            padding: 16px 18px;
            border-radius: 6px;
            border: 1px solid var(--hairline);
            margin-bottom: 15px;
            text-align: left;
            font-family: ui-monospace, monospace;
            font-size: 14px;
            color: var(--text-dim);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }

        .module {
            border: 1px solid var(--hairline);
            border-radius: 6px;
            padding: 22px 24px;
            margin-bottom: 20px;
            background: var(--panel-raised);
        }
        .module > .form-group:last-child {
            margin-bottom: 0;
        }

        .tag {
            display: inline-block;
            font-family: ui-monospace, monospace;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            border: 1px solid var(--hairline);
            color: var(--text-dim);
        }
        .tag.ok { color: var(--ok); border-color: var(--ok); }

        .step-list {
            list-style: none;
            font-family: ui-monospace, monospace;
            font-size: 12.5px;
            color: var(--text-dim);
            margin: 0 0 12px;
        }
        .step-list li { padding: 3px 0; }
        .step-list li.done { color: var(--ok); }
        .step-list li.active { color: var(--text); }
        .step-list li.failed { color: var(--bad); }

        .progress {
            height: 6px;
            border-radius: 3px;
            background: var(--bg);
            border: 1px solid var(--hairline);
            overflow: hidden;
            margin: 0 0 12px;
        }
        .progress-bar { height: 100%; background: var(--amber); transition: width 0.2s ease; }

        /* Multi-line, boxed status messages for the Migrate tab, distinct
           from the shared single-line .status used elsewhere - migration has
           several sequential sub-steps that need more than one line. */
        .migrate-status-box {
            margin: 0 0 16px;
            padding: 14px 16px;
            border-radius: 6px;
            font-size: 13.5px;
            border: 1px solid var(--hairline);
            background: var(--bg);
            white-space: pre-line;
        }
        .migrate-status-box.error { color: var(--bad); }
        .migrate-status-box.success { color: var(--ok); }
        .migrate-status-box.loading { color: var(--text-dim); }

        .key-row {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--hairline);
            outline: 2px solid transparent;
            outline-offset: 2px;
            border-radius: 4px;
            transition: outline-color 0.5s ease;
        }
        .key-row:last-child { border-bottom: none; }
        /* Briefly outlines a row right after it moves - two adjacent
           did:key values look nearly identical at a glance, so a successful
           reorder needs a visible confirmation beyond the position number
           changing. */
        .key-row.key-row-flash {
            outline-color: var(--amber);
            transition: none;
        }
        .key-row .key-position {
            font-family: ui-monospace, monospace;
            font-size: 11.5px;
            color: var(--text-dim);
            width: 1.4em;
            flex-shrink: 0;
        }
        .key-row .key-value {
            font-family: ui-monospace, 'SF Mono', Consolas, monospace;
            font-size: 12.5px;
            color: var(--amber);
            word-break: break-all;
            flex: 1;
        }
        .key-row .key-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }
        .key-row .key-actions button {
            appearance: none;
            border: 1px solid var(--hairline);
            background: transparent;
            color: var(--text);
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
        }
        .key-row .key-actions button:hover { border-color: var(--text-dim); }
        .key-row .key-actions button:disabled { opacity: 0.3; cursor: not-allowed; }

        @media (max-width: 640px) {
            .header-slot, .tab-pane { padding-left: 26px; padding-right: 26px; }
            .tab-navigation { padding-left: 26px; padding-right: 26px; }
            /* The 1.25 zoom is sized for spacious desktop viewing; on a
               narrow screen it just makes everything cramped, so drop back
               to the unscaled baseline instead of fighting it field-by-field. */
            .container { zoom: 1; }
            /* The desktop side padding (20px) eats a much bigger share of a
               narrow phone screen - shrink it so the card uses the space. */
            body { padding: 24px 8px; }
            /* This button's text is long enough to already be most of the
               way to full width on a phone - close the gap. */
            .confirm-seed-section .generate-btn { width: 100%; }
            /* rows="3" wraps a 24-word phrase onto more lines than that on a
               narrow screen, so it doesn't fit without scrolling - ~50% taller. */
            .mnemonic-input-container textarea { min-height: 130px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-slot">
            <div class="path">~/atproto <span class="amber">$</span> <span id="status-line">self-sovereign identity</span></div>
        </div>

        <!-- Tab Navigation -->
        <div class="tab-navigation">
            <button class="tab-btn active" id="keygen-tab" data-tab="keygen">
                Key
            </button>
            <button class="tab-btn" id="createaccount-tab" data-tab="createaccount">
                Account
            </button>
            <button class="tab-btn" id="handle-tab" data-tab="handle">
                Handle
            </button>
            <button class="tab-btn" id="control-tab" data-tab="control">
                Control
            </button>
            <button class="tab-btn" id="migrate-tab" data-tab="migrate">
                Migrate
            </button>
        </div>
        
        <!-- Tab Content -->
        <div class="tab-content">
            <!-- Key Generation Tab -->
            <div class="tab-pane active" id="keygen-pane">

        <div class="key-display" id="keyDisplay" style="display: none;">No key generated yet</div>

        <div class="did-key-display" id="didKeyDisplay" style="display: none;">
            <div class="box-header">
                <h3>Key</h3>
                <button class="copy-icon" id="copyDidKeyBtn" title="Copy DID:Key to clipboard">📋</button>
            </div>
            <div class="did-key-text" id="didKeyText"></div>
        </div>


        <div class="mnemonic-display" id="mnemonicDisplay" style="display: none;">
            <div class="box-header">
                <h3>Secret Key Phrase</h3>
                <button class="copy-icon" id="copyMnemonicBtn" title="Copy mnemonic to clipboard">📋</button>
            </div>
            <div class="mnemonic-text" id="mnemonicText"></div>
        </div>

        <div class="confirm-seed-section" id="confirmSeedSection" style="display: none;">
            <button class="generate-btn" id="confirmSeedBtn">I have written down this seed phrase</button>
        </div>

        <div class="key-generation-section" id="keyGenerationSection">
            <div class="button-group">
                <button class="generate-btn" id="generateBtn">
                    Generate key
                </button>
            </div>

            <div class="restore-section">
                <h3>Restore from a phrase</h3>

                <div class="mnemonic-input-container">
                    <textarea
                        id="mnemonicInput"
                        placeholder="Enter seed phrase..."
                        rows="3"
                    ></textarea>
                </div>

                <div class="restore-button-group">
                    <button class="restore-btn" id="restoreBtn">
                        Restore key
                    </button>

                    <button class="clear-btn" id="clearBtn">
                        Clear
                    </button>
                </div>
            </div>
        </div>

        <div class="clear-key-section" id="clearKeySection" style="display: none;">
            <button class="clear-btn" id="clearKeyBtn">
                Clear current key
            </button>
        </div>

        
        <div class="status" style="display: none;"></div>
            </div>
            
            <!-- Create Account Tab -->
            <div class="tab-pane" id="createaccount-pane">
                <div class="plc-form-container">
                    <form id="createaccount-form" class="plc-form">
                        <div class="module">
                            <div class="form-group">
                                <label for="pds-endpoint">hosting server</label>
                                <input type="text" id="pds-endpoint" name="pdsEndpoint" placeholder="pds.example.com" value="https://pds.goat.navy" required>
                            </div>

                            <div class="form-group">
                                <label for="account-handle">handle</label>
                                <div style="display: flex; gap: 8px; align-items: center;">
                                    <input type="text" id="account-handle-subdomain" name="handleSubdomain" placeholder="username" required style="flex: 1;">
                                    <span style="font-size: 16px; color: var(--text-dim);">@</span>
                                    <select id="account-handle-domain" name="handleDomain" required style="flex: 1;">
                                        <option value="">Select domain...</option>
                                    </select>
                                </div>
                                <input type="hidden" id="account-handle" name="handle">
                                <input type="hidden" id="account-did-value" name="did">
                            </div>
                        </div>

                        <div class="module">
                            <div class="form-group">
                                <label for="account-email">email</label>
                                <input type="email" id="account-email" name="email" placeholder="user@example.com" required>
                            </div>

        function generatePublicKey(privateKeyHex) {
            try {
                // Convert hex string to Uint8Array
                const privateKeyBytes = new Uint8Array(32);
                for (let i = 0; i < privateKeyHex.length; i += 2) {
                    privateKeyBytes[i / 2] = parseInt(privateKeyHex.slice(i, i + 2), 16);
                }

                // Generate public key using @noble/secp256k1
                const publicKeyBytes = secp256k1.getPublicKey(privateKeyBytes, true); // true = compressed

                // Convert public key bytes to hex string
                const publicKeyHex = Array.from(publicKeyBytes)
                    .map(byte => byte.toString(16).padStart(2, '0'))
                    .join('');

                return publicKeyHex;
            } catch (error) {
                console.error('Error generating public key:', error);
                throw new Error('Failed to generate public key: ' + error.message);
            }

        // Generate DID key from secp256k1 public key
        function generateDidKey(publicKeyHex) {
            try {
                // Convert hex string to Uint8Array
                const publicKeyBytes = new Uint8Array(33);

                    publicKeyBytes[i / 2] = parseInt(publicKeyHex.slice(i, i + 2), 16);

                const multicodecPrefix = new Uint8Array([0xe7, 0x01]);
                const prefixedKey = new Uint8Array([...multicodecPrefix, ...publicKeyBytes]);

                const didKey = `did:key:${encoded}`;

                const signatureBytes = new Uint8Array(atob(paddedSignature).split('').map(c => c.charCodeAt(0)));
                console.log('Signature bytes (hex):', Array.from(signatureBytes).map(b => b.toString(16).padStart(2, '0')).join(''));
                console.log('Signature length:', signatureBytes.length);

                const unsignedOperation = { ...signedOperation };

                const dagCborBytes = dagCborEncode(unsignedOperation);

        function createDidPlcInitialOperation(data, rotationKey) {

                // Format handle as AT Protocol identifier
                const handle = data.handle.trim();
                // If handle already contains '@' or is already an at:// URL, use it as-is
                // Otherwise, format it as at://handle
                if (handle.startsWith('at://')) {
                    alsoKnownAs.push(handle);
                } else if (handle.includes('.')) {
                    // Handle might be in format like handle.domain, format as at://handle.domain
                    alsoKnownAs.push(`at://${handle}`);

                    // Just handle name, format as at://handle
                    alsoKnownAs.push(`at://${handle}`);
                }

            return {
                type: 'plc_operation',
                prev: null,
                rotationKeys: [rotationKey],
                verificationMethods: {

                },
                alsoKnownAs: alsoKnownAs,
                services: {

        function base64UrlEncode(str) {
            // Use btoa directly - it treats the string as Latin-1, not UTF-8
            // This is correct for binary data where each character represents a byte
            const base64 = btoa(str);
            // Convert to base64url (URL-safe, no padding)
            return base64
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=/g, '');

                const wellKnownUrl = `${pdsEndpoint}/.well-known/did.json`;
                const response = await fetch(wellKnownUrl);
                if (response.ok) {
                    const didDoc = await response.json();
                    if (didDoc.id) {
                        console.log('Resolved PDS DID from well-known:', didDoc.id);
                        return { did: didDoc.id, availableUserDomains: [] };
                    }
                }
            } catch (error) {
                console.log('Could not resolve PDS DID from well-known:', error);
            }

            // If we can't resolve the DID, throw an error instead of using the URL
            // The PDS requires the DID as the audience, not the URL
            throw new Error('Could not resolve PDS server information. Please ensure the PDS endpoint is correct and accessible.');
        }

        // Get PDS DID from endpoint (try multiple methods)
        async function getPdsDid(pdsEndpoint) {
            const serverInfo = await getPdsServerInfo(pdsEndpoint);
            return serverInfo.did;
        }

        // Create a JWT service authentication token signed with the rotation key
        async function createServiceAuthToken(didPlcId, pdsEndpoint, privateKeyHex) {
            try {
                console.log('=== Creating Service Auth Token ===');
                console.log('DID:PLC ID:', didPlcId);
                console.log('PDS Endpoint:', pdsEndpoint);

                // Get PDS DID for audience
                const pdsDid = await getPdsDid(pdsEndpoint);

                // Create JWT header
                const header = {
                    alg: 'ES256K',
                    typ: 'JWT'
                };

                // Create JWT payload
                const now = Math.floor(Date.now() / 1000);
                const payload = {
                    iss: didPlcId,  // Issuer: User's DID
                    aud: pdsDid,    // Audience: PDS DID or endpoint URL
                    exp: now + 60,  // Expiration: 60 seconds from now
                    iat: now,       // Issued At: Current timestamp
                    jti: generateJti(),  // JWT ID: Unique identifier
                    lxm: 'com.atproto.server.createAccount'  // Lexicon Method
                };

                console.log('JWT Header:', header);
                console.log('JWT Payload:', payload);

                // Base64URL encode header and payload
                const encodedHeader = base64UrlEncode(JSON.stringify(header));
                const encodedPayload = base64UrlEncode(JSON.stringify(payload));
                const signingInput = `${encodedHeader}.${encodedPayload}`;

                console.log('Signing input:', signingInput);

                // Hash the signing input with SHA-256
                const signingInputBytes = new TextEncoder().encode(signingInput);
                const messageHash = await crypto.subtle.digest('SHA-256', signingInputBytes);
                const messageHashHex = Array.from(new Uint8Array(messageHash))
                    .map(b => b.toString(16).padStart(2, '0'))
                    .join('');

                console.log('Message hash (SHA-256):', messageHashHex);

                // Convert hex private key to Uint8Array
                const privateKeyBytes = new Uint8Array(32);
                for (let i = 0; i < privateKeyHex.length; i += 2) {
                    privateKeyBytes[i / 2] = parseInt(privateKeyHex.slice(i, i + 2), 16);
                }

                // Sign the hashed message using @noble/secp256k1, asking for the
                // compact (r||s, 64-byte) format directly instead of DER. The
                // previous approach signed with DER output and hand-parsed it back
                // apart, which stripped a leading zero-padding byte from r but not
                // from s — correct whenever s's DER encoding didn't need padding,
                // but throwing (or worse, silently wrong) whenever it did, which
                // happens for roughly half of all signatures depending on the
                // random per-signature nonce. { der: false } sidesteps all of that
                // by having the library hand back an already-correct 64-byte value.
                const signatureArray = await secp256k1.sign(messageHashHex, privateKeyBytes, { der: false });

                if (!(signatureArray instanceof Uint8Array) || signatureArray.length !== 64) {
                    throw new Error(`Unexpected signature format: expected 64-byte Uint8Array, got ${signatureArray && signatureArray.length}`);
                }

                console.log('Signature array before encoding (hex):', Array.from(signatureArray).map(b => b.toString(16).padStart(2, '0')).join(''));
                console.log('Signature array length:', signatureArray.length);

                // Base64URL encode the signature
                // Build string from bytes using a loop to avoid spread operator issues
                let signatureString = '';
                for (let i = 0; i < signatureArray.length; i++) {
                    signatureString += String.fromCharCode(signatureArray[i]);
                }
                console.log('Signature string length:', signatureString.length);
                const encodedSignature = base64UrlEncode(signatureString);
                console.log('Encoded signature:', encodedSignature);
                console.log('Encoded signature length:', encodedSignature.length);

                // Assemble the complete JWT
                const jwt = `${signingInput}.${encodedSignature}`;

                console.log('Generated JWT:', jwt);

                return jwt;

            } catch (error) {
                console.error('Error creating service auth token:', error);
                throw error;
            }
        }

        // Verify a JWT service authentication token using a public key
        async function verifyServiceAuthToken(jwt, publicKeyHex) {
            try {
                console.log('=== Verifying Service Auth Token ===');
                console.log('JWT:', jwt);
                console.log('Public Key (hex):', publicKeyHex);

                // Parse JWT
                const parts = jwt.split('.');
                if (parts.length !== 3) {
                    throw new Error('Invalid JWT format: expected 3 parts');
                }

                const [encodedHeader, encodedPayload, encodedSignature] = parts;

                // Decode header and payload
                const headerJson = atob(encodedHeader.replace(/-/g, '+').replace(/_/g, '/'));
                const payloadJson = atob(encodedPayload.replace(/-/g, '+').replace(/_/g, '/'));
                const header = JSON.parse(headerJson);
                const payload = JSON.parse(payloadJson);

                console.log('JWT Header:', header);
                console.log('JWT Payload:', payload);

                // Check algorithm
                if (header.alg !== 'ES256K') {
                    throw new Error(`Unsupported algorithm: ${header.alg}`);
                }

                // Recreate signing input
                const signingInput = `${encodedHeader}.${encodedPayload}`;
                console.log('Signing input:', signingInput);

                // Hash the signing input with SHA-256
                const signingInputBytes = new TextEncoder().encode(signingInput);
                const messageHash = await crypto.subtle.digest('SHA-256', signingInputBytes);
                const messageHashHex = Array.from(new Uint8Array(messageHash))
                    .map(b => b.toString(16).padStart(2, '0'))
                    .join('');

                console.log('Message hash (SHA-256):', messageHashHex);

                // Decode signature from base64url
                console.log('Encoded signature from JWT:', encodedSignature);
                console.log('Encoded signature length:', encodedSignature.length);
                const signatureBase64 = encodedSignature.replace(/-/g, '+').replace(/_/g, '/');
                const padding = '='.repeat((4 - signatureBase64.length % 4) % 4);
                console.log('Base64 signature (with padding):', signatureBase64 + padding);
                const signatureBinaryString = atob(signatureBase64 + padding);
                console.log('Decoded binary string length:', signatureBinaryString.length);
                const signatureBytes = new Uint8Array(signatureBinaryString.length);
                for (let i = 0; i < signatureBinaryString.length; i++) {
                    signatureBytes[i] = signatureBinaryString.charCodeAt(i);
                }

                console.log('Signature bytes length:', signatureBytes.length);
                console.log('Signature bytes (hex):', Array.from(signatureBytes).map(b => b.toString(16).padStart(2, '0')).join(''));

                if (signatureBytes.length !== 64) {
                    console.error(`Invalid signature length: expected 64 bytes, got ${signatureBytes.length}`);
                    console.error('This suggests the JWT was created with incorrect encoding. Please regenerate the JWT.');
                    throw new Error(`Invalid signature length: expected 64 bytes, got ${signatureBytes.length}`);
                }

                // Convert public key hex to Uint8Array
                const publicKeyBytes = new Uint8Array(33); // Compressed public key is 33 bytes
                for (let i = 0; i < publicKeyHex.length; i += 2) {
                    publicKeyBytes[i / 2] = parseInt(publicKeyHex.slice(i, i + 2), 16);
                }

                // Verify signature using @noble/secp256k1
                // Note: secp256k1.verify expects the signature in compact format (64 bytes: r + s)
                // and the message hash as a hex string (same as secp256k1.sign)
                const isValid = secp256k1.verify(signatureBytes, messageHashHex, publicKeyBytes);

                console.log('Signature verification result:', isValid);

                if (isValid) {
                    console.log('✓ JWT signature is VALID');
                } else {
                    console.error('✗ JWT signature is INVALID');
                }

                return isValid;

            } catch (error) {
                console.error('Error verifying service auth token:', error);
                throw error;
            }
        }

        // Create an account on the PDS for a DID we already control. Submits
        // only handle/email/password/did/inviteCode - never touches PLC
        // operations itself, so it can't trigger any PDS-side rotation-key
        // requirement on plc operation submission (that lives in a separate
        // endpoint, com.atproto.identity.submitPlcOperation, which this tool
        // never calls - we submit PLC operations straight to plc.directory).
        async function createAccountForExistingDid(pdsEndpoint, handle, email, password, didPlcId, inviteCode, privateKeyHex) {                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
            try {
                console.log('=== Creating Account ===');
                console.log('PDS Endpoint:', pdsEndpoint);
                console.log('Handle:', handle);
                console.log('Email:', email);
                console.log('DID:PLC ID:', didPlcId);

                const endpoint = `${pdsEndpoint}/xrpc/com.atproto.server.createAccount`;
                console.log('Creating account at endpoint:', endpoint);
                            // Create JWT service authentication token
                // This is signed with our rotation key, which is still the current verification method
                // The PDS will verify the JWT using the current verification method, then apply the update
                const jwt = await createServiceAuthToken(didPlcId, pdsEndpoint, privateKeyHex);

                // Self-verify the JWT to ensure signature is correct
                const publicKeyHex = generatePublicKey(privateKeyHex);
                const isValid = await verifyServiceAuthToken(jwt, publicKeyHex);
                if (!isValid) {
                    console.error('WARNING: JWT signature verification failed! The JWT we created is invalid.');
                    throw new Error('JWT signature verification failed - the created JWT is invalid');
                }
                console.log('✓ JWT signature verified successfully before sending to PDS');

                const requestBody = {
                    handle: handle,
                    email: email,
                    password: password,
                    did: didPlcId
                };

                // Add invite code if provided
                if (inviteCode && inviteCode.trim()) {
                    requestBody.inviteCode = inviteCode.trim();
                }

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${jwt}`
                    },
                    body: JSON.stringify(requestBody)
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', Object.fromEntries(response.headers.entries()));

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Account creation failed:', errorText);
                    throw new Error(`Failed to create account: ${response.status} ${response.statusText}\n${errorText}`);
                }

                const result = await response.json();
                console.log('Account creation successful:', result);

                // NOTE: activation happens later, after the DID update below is
                // submitted — see activateAccountAfterDidUpdate. createAccount
                // with an existing DID leaves the account deactivated, and
                // activateAccount checks the DID doc against the actor's real
                // signing key, which isn't published yet at this point.

                return { success: true, result: result };

            } catch (error) {
                console.error('Error creating account:', error);
                throw error;
            }
        }

        // Activate an account created with an existing DID. Must only be called
        // after the DID update handing #atproto to the PDS's reserved key has
        // been submitted — activateAccount checks the published DID doc against
        // the actor's real signing key, so calling this any earlier will always
        // fail with a signing-key mismatch, even though the account itself was
        // created successfully.
        async function activateAccountAfterDidUpdate(pdsEndpoint, accessJwt) {
            console.log('activating account...');
            const activateEndpoint = `${pdsEndpoint}/xrpc/com.atproto.server.activateAccount`;
            const activateResponse = await fetch(activateEndpoint, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessJwt}`
                }
            });
            if (!activateResponse.ok) {
                const activateErrorText = await activateResponse.text();
                console.warn('Warning: Failed to activate account:', activateErrorText);
                return { success: false, error: activateErrorText };
            }
            console.log('Account activated successfully');
            return { success: true, error: null };
        }

        // Some PDSes (the stock/unpatched reference implementation) refuse to
        // activate a self-custodied account unless their own rotation key is
        // present in the DID's rotationKeys. Detects that specific failure so
        // we know it's safe to work around, rather than treating any
        // activation failure the same way.
        function isRotationKeyCheckFailure(activateErrorText) {
            return !!activateErrorText && activateErrorText.includes('Server rotation key not included in PLC DID data');
        }

        // Build, sign and submit a PLC operation that only changes
        // rotationKeys, leaving everything else (verification methods,
        // handle, PDS endpoint) exactly as currently published.
        async function submitRotationKeysUpdate(didPlcId, newRotationKeys, privateKeyHex) {
            const currentDoc = await fetchDidPlcRecord(didPlcId);
            const op = {
                type: 'plc_operation',
                prev: await getLastOperationCid(didPlcId),
                rotationKeys: newRotationKeys,
                verificationMethods: currentDoc.didDocument.verificationMethods,
                alsoKnownAs: currentDoc.didDocument.alsoKnownAs,
                services: currentDoc.didDocument.services
            };
            const signedOp = await signDidPlcOperation(op, privateKeyHex);
            return submitDidPlcOperation(signedOp, didPlcId);
        }

        // Work around a PDS that requires its own rotation key to activate:
        // temporarily add it (after our own key, so it's never the senior key
        // for recovery purposes), retry activation, then remove it again
        // regardless of whether the retry succeeded, so it's left in place for
        // as little time as possible. This is a deliberate, permanent trade-off
        // - once a key has ever been a valid rotation key for a did:plc, that
        // fact stays in the DID's history forever, even after removal - but
        // still leaves the account far more self-custodied than leaving the
        // PDS's key in place permanently, which is the alternative on a PDS
        // that enforces this check.
        // Adds/removes pdsRotationKey relative to whatever rotationKeys are
        // *currently* published, rather than assuming a single-key genesis
        // DID - the bring-your-own-DID account-creation flow only ever has
        // one key at this point, but the Migrate tab's DID can already have
        // two (the held key plus the old PDS's, deliberately kept until its
        // own separate cleanup step), and hardcoding a 2-element array here
        // would silently drop that second key. currentDidKey is only used
        // as the fallback for a doc with no rotationKeys at all.
        async function activateWithTemporaryPdsRotationKey(pdsEndpoint, accessJwt, didPlcId, currentDidKey, pdsRotationKey, privateKeyHex) {
            console.log('PDS requires its own rotation key to activate - adding it temporarily');

            const docNow = await fetchDidPlcRecord(didPlcId);
            const baseKeys = docNow.didDocument.rotationKeys || [currentDidKey];
            const alreadyHasPdsKey = baseKeys.includes(pdsRotationKey);
            if (!alreadyHasPdsKey) {
                const addResult = await submitRotationKeysUpdate(didPlcId, [...baseKeys, pdsRotationKey], privateKeyHex);
                if (!addResult.success) {
                    throw new Error('Failed to temporarily add the PDS rotation key');
                }
                console.log('Temporarily added PDS rotation key (lower priority than existing keys)');
            }

            const retryResult = await activateAccountAfterDidUpdate(pdsEndpoint, accessJwt);

            // Remove it again regardless of whether activation just succeeded -
            // no reason to leave it there any longer than necessary either way.
            const docAfter = await fetchDidPlcRecord(didPlcId);
            if (docAfter.didDocument.rotationKeys?.includes(pdsRotationKey)) {
                const restoredKeys = docAfter.didDocument.rotationKeys.filter((k) => k !== pdsRotationKey);
                const removeResult = await submitRotationKeysUpdate(didPlcId, restoredKeys, privateKeyHex);
                if (!removeResult.success) {
                    console.warn('Failed to remove the temporary PDS rotation key - it is still present on the DID and should be removed manually');
                } else {
                    console.log('Removed temporary PDS rotation key');
                }
            }

            return retryResult;
        }

        // Check whether an account from a previous, interrupted run of this
        // flow already exists on the PDS, by trying to log into it. Used to
        // resume after createAccount succeeded but a later step (or the
        // client) failed before finishing - createSession works even for a
        // still-deactivated account, so this doubles as session recovery when
        // the original createAccount response was never received.
        // Unauthenticated existence check - distinguishes "nothing here yet"
        // from "something's here" without needing the account's password,
        // and tells us whose account it is so we don't try to log into (or
        // recreate) a handle that belongs to someone else.
        // repoIdentifier can be a handle or a DID - describeRepo's `repo`
        // param accepts either, and querying by DID is what makes the
        // Migrate tab's resume logic possible without persisting anything:
        // it doesn't matter what handle was typed into a form field, only
        // that the DID matches.
        async function checkExistingRepo(pdsEndpoint, repoIdentifier) {
            const response = await fetch(`${pdsEndpoint}/xrpc/com.atproto.repo.describeRepo?repo=${encodeURIComponent(repoIdentifier)}`);
            if (response.ok) {
                const result = await response.json();
                return { exists: true, did: result.did, handle: result.handle };
            }
            const errorBody = await response.json().catch(() => ({}));
            if (errorBody.error === 'RepoNotFound') {
                return { exists: false };
            }
            if (errorBody.error === 'RepoDeactivated') {
                // A mid-creation resume (activateAccount never ran) looks
                // like this - the PDS won't reveal the DID or handle for a
                // deactivated repo via this lookup, so ownership is confirmed
                // by the password check instead.
                return { exists: true, did: null, handle: null };
            }
            throw new Error(`Could not check for an existing account: ${errorBody.message || response.statusText}`);
        }

        async function tryLoginToExistingAccount(pdsEndpoint, handle, password) {
            console.log('Logging into the existing account for this handle...');
            const response = await fetch(`${pdsEndpoint}/xrpc/com.atproto.server.createSession`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ identifier: handle, password: password })
            });
            if (!response.ok) {
                console.log('Login failed - wrong password for this account');
                return { success: false };
            }
            const result = await response.json();
            console.log('Found an existing account for this handle, reusing it:', result.did);
            return { success: true, result: result };
        }

        async function callUpdateHandle(pdsEndpoint, accessJwt, handle) {
            const res = await fetch(`${pdsEndpoint}/xrpc/com.atproto.identity.updateHandle`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${accessJwt}` },
                body: JSON.stringify({ handle }),
            });
            if (!res.ok) {
                const errorText = await res.text();
                throw new Error(`updateHandle failed: ${res.status} ${errorText}`);
            }
        }

        // Some PDSes (the stock/unpatched reference implementation) refuse to
        // let a self-custodied account update its handle on their own - same
        // underlying assumption as the activate-time rotation-key check, but
        // surfacing differently: the PDS still attempts to self-sign and
        // submit its own PLC operation regardless of who holds the rotation
        // key, so the rejection comes from plc.directory itself, not the PDS
        // validating up front.
        function isHandleUpdateSignatureFailure(updateErrorText) {
            return !!updateErrorText && updateErrorText.includes('Invalid signature on op');
        }

        // Work around a PDS that can't update a self-custodied account's
        // handle on its own: temporarily add its rotation key (after our own,
        // so it's never senior for recovery purposes), retry updateHandle,
        // then remove the key again regardless of outcome. Same trade-off as
        // activateWithTemporaryPdsRotationKey - reused rather than
        // generalized into one function, since the "thing to retry" differs
        // and the existing activate path is already proven; duplicating this
        // small a pattern is safer than reshaping working code around it.
        async function updateHandleWithTemporaryPdsRotationKey(pdsEndpoint, accessJwt, didPlcId, currentDidKey, pdsRotationKey, privateKeyHex, handle) {
            console.log('PDS requires its own rotation key to update the handle - adding it temporarily');

            const docNow = await fetchDidPlcRecord(didPlcId);
            const baseKeys = docNow.didDocument.rotationKeys || [currentDidKey];
            const alreadyHasPdsKey = baseKeys.includes(pdsRotationKey);
            if (!alreadyHasPdsKey) {
                const addResult = await submitRotationKeysUpdate(didPlcId, [...baseKeys, pdsRotationKey], privateKeyHex);
                if (!addResult.success) {
                    throw new Error('Failed to temporarily add the PDS rotation key');
                }
                console.log('Temporarily added PDS rotation key (lower priority than existing keys)');
            }

            let retryError = null;
            try {
                await callUpdateHandle(pdsEndpoint, accessJwt, handle);
            } catch (error) {
                retryError = error;
            }

            // Remove it again regardless of whether the retry just succeeded
            // - no reason to leave it there any longer than necessary either way.
            const docAfter = await fetchDidPlcRecord(didPlcId);
            if (docAfter.didDocument.rotationKeys?.includes(pdsRotationKey)) {
                const restoredKeys = docAfter.didDocument.rotationKeys.filter((k) => k !== pdsRotationKey);
                const removeResult = await submitRotationKeysUpdate(didPlcId, restoredKeys, privateKeyHex);
                if (!removeResult.success) {
                    console.warn('Failed to remove the temporary PDS rotation key - it is still present on the DID and should be removed manually');
                } else {
                    console.log('Removed temporary PDS rotation key');
                }
            }

            if (retryError) {
                throw retryError;
            }
        }

        // Create an account on the PDS
        async function createAccount(pdsEndpoint, handle, email, password, recoveryKey, inviteCode) {
            try {
                console.log('=== Creating Account ===');
                console.log('PDS Endpoint:', pdsEndpoint);
                console.log('Handle:', handle);
                console.log('Email:', email);
                console.log('Recovery Key:', recoveryKey);

                const endpoint = `${pdsEndpoint}/xrpc/com.atproto.server.createAccount`;
                console.log('Creating account at endpoint:', endpoint);

                    handle: handle,
                    email: email,
                    password: password,
                    recoveryKey: recoveryKey
                };

                // Add invite code if provided
                if (inviteCode && inviteCode.trim()) {
                    requestBody.inviteCode = inviteCode.trim();
                }

                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestBody)
                });

                console.log('Response status:', response.status);
                console.log('Response headers:', Object.fromEntries(response.headers.entries()));

                if (!response.ok) {
                    const errorText = await response.text();
                    console.error('Account creation failed:', errorText);
                    throw new Error(`Failed to create account: ${response.status} ${response.statusText}\n${errorText}`);
                }

                return { success: true, result: result };

            } catch (error) {
                console.error('Error creating account:', error);
                throw error;
            }
        }

        // Sign a DID:PLC operation with the current key
        // Signs with @noble/secp256k1's { der: false } compact (r||s, 64-byte)
        // output directly, rather than hand-parsing DER. The previous version
        // of this function parsed DER manually and stripped a leading
        // zero-padding byte from r but not from s - correct whenever s's DER
        // encoding didn't need padding, but throwing whenever it did, which
        // happens for roughly half of all signatures depending on the random
        // per-signature nonce (see the equivalent, already-fixed note on
        // createServiceAuthToken).
        async function signDidPlcOperation(operation, privateKeyHex) {
            const operationForSigning = { ...operation };
            delete operationForSigning.sig;

            const dagCborBytes = dagCborEncode(operationForSigning);
            const messageHash = await crypto.subtle.digest('SHA-256', dagCborBytes);
            const messageHashHex = Array.from(new Uint8Array(messageHash)).map(b => b.toString(16).padStart(2, '0')).join('');

            const privateKeyBytes = new Uint8Array(32);
            for (let i = 0; i < privateKeyHex.length; i += 2) {
                privateKeyBytes[i / 2] = parseInt(privateKeyHex.slice(i, i + 2), 16);
            }

            const signatureArray = await secp256k1.sign(messageHashHex, privateKeyBytes, { der: false });
            if (!(signatureArray instanceof Uint8Array) || signatureArray.length !== 64) {
                throw new Error(`Unexpected signature format: expected 64-byte Uint8Array, got ${signatureArray && signatureArray.length}`);
            }

            const signatureBase64 = btoa(String.fromCharCode(...signatureArray))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=/g, '');

            return { ...operation, sig: signatureBase64 };
        }

        // Generate a DID:PLC ID from operation
        async function generateDidPlcId(operation) {
            try {
                // For testing with real data, include the signature
                // In production, you'd sign the unsigned operation first
                const operationForHash = { ...operation };

                console.log('Operation includes signature:', !!operationForHash.sig);
                console.log('Operation for hashing:', operationForHash);

                // Serialize operation to DAG-CBOR
                const dagCborBytes = dagCborEncode(operationForHash);

                // Debug: Output the DAG-CBOR bytes

        // DID:PLC fetching functionality
        async function fetchDidPlcRecord(didPlc) {
            const url = `https://plc.directory/${didPlc}/log/audit`;
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const err = new Error(`HTTP ${response.status}: ${response.statusText}`);
                    err.status = response.status;
                    throw err;
                }
                const auditLog = await response.json();

                // Get the latest (current) record from the audit log
                if (auditLog.length === 0) {
                    throw new Error('No records found in audit log');
                }

                const latestRecord = auditLog[auditLog.length - 1];
                const operation = latestRecord.operation;

                // Extract the DID document data from the operation
                console.log('Latest record operation:', operation);
                console.log('Operation rotation keys:', operation.rotationKeys);

                const didDocument = {
                    id: latestRecord.did,
                    rotationKeys: operation.rotationKeys,
                    verificationMethods: operation.verificationMethods,
                    services: operation.services,
                    alsoKnownAs: operation.alsoKnownAs,
                    previousRotationKey: latestRecord.operation.prev
                };

                console.log('Extracted DID document:', didDocument);

                return { didDocument, auditLog };
            } catch (error) {
                console.error('Failed to fetch DID document:', error);
                throw error;
            }
        }

        async function resolveActorDid(actor) {
            if (actor.startsWith('did:')) return actor;
            const profile = await appViewGet('app.bsky.actor.getProfile', { actor });
            return profile.did;
        }

        async function getListMembers(listUri) {
            const dids = [];
            let cursor;
            do {
                const params = cursor ? { list: listUri, limit: '100', cursor } : { list: listUri, limit: '100' };
                const page = await appViewGet('app.bsky.graph.getList', params);
                dids.push(...page.items.map((item) => item.subject.did));
                cursor = page.cursor;
            } while (cursor);
            return dids;
        }

        async function getStarterPack(uri) {
            const result = await appViewGet('app.bsky.graph.getStarterPack', { starterPack: uri });
            const listUri = result.starterPack?.list?.uri;
            const feeds = (result.starterPack?.record?.feeds || []).map((feed) => feed.uri);
            if (!listUri) throw new Error('Starter pack has no list');
            return { listUri, feeds };
        }
