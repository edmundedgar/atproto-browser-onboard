<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src https:; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self'; img-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src 'none';">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set up .eth Domain</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="eth.css">
</head>
<body>
    <div class="container">
        <div class="header-slot">
            <div class="path">~/atproto <span class="amber">$</span> link .eth domain</div>
        </div>
        <div class="content" id="content"></div>
    </div>

    <!-- Load ethers.js -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>

    <script>
        // Escapes text before it's interpolated into an innerHTML template -
        // did/account come straight from the URL and are otherwise unescaped.
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str ?? '';
            return div.innerHTML;
        }

        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const did = urlParams.get('did');
        const account = urlParams.get('account');

        const contentDiv = document.getElementById('content');

        // Check if parameters are missing
        if (!did || !account) {
            const missingParams = [];
            if (!did) missingParams.push('did');
            if (!account) missingParams.push('account');

            contentDiv.innerHTML = `
                <div class="status error">Missing required parameter${missingParams.length > 1 ? 's' : ''}: ${escapeHtml(missingParams.join(', '))}. Please return to the account creation page and try again.</div>
            `;
        } else {
            // Show loading state
            contentDiv.innerHTML = `
                <div class="status loading">Checking domain status...</div>
            `;

            // Check server for current status
            checkDomainStatus(account, did);
        }

        async function checkDomainStatus(domain, expectedDid) {
            try {
                const url = `https://ens.goat.navy/atproto-did/${encodeURIComponent(domain)}`;
                const response = await fetch(url);

                if (response.ok) {
                    const result = await response.json();

                    if (result.success && result.did === expectedDid) {
                        // Domain is already set up with the expected DID
                        contentDiv.innerHTML = `
                            <div class="status success">.eth.link is ready — found the expected DID.</div>
                            <div class="module">
                                <div class="field">
                                    <label>account name</label>
                                    <div class="value">${escapeHtml(account)}</div>
                                </div>
                                <div class="field">
                                    <label>did:plc identifier</label>
                                    <div class="value">${escapeHtml(did)}</div>
                                </div>
                            </div>
                        `;
                    } else {
                        // Domain not set up or has different DID
                        showAccountInfo(account, did, result);
                    }
                } else {
                    // Server error
                    showAccountInfo(account, did, { error: 'Failed to check domain status' });
                }
            } catch (error) {
                console.error('Error checking domain status:', error);
                showAccountInfo(account, did, { error: error.message });
            }
        }

        // Cases where we know there's nothing to lose: no domain registered yet, or
        // registered with no contenthash set at all. Anything else (existing contenthash
        // that isn't ours, an invalid/unreadable file there, or a gateway error we can't
        // interpret) might mean the domain already points to someone's real site - so we
        // don't offer to overwrite it automatically, only when we're sure it's empty.
        function safeToAutomate(errorType) {
            return errorType === 'no_domain' || errorType === 'no_contenthash';
        }

        function showAccountInfo(account, did, statusResult) {
            if (statusResult.success && statusResult.did && statusResult.did !== did) {
                showDifferentAccountWarning(account, did, statusResult.did);
                return;
            }

            if (!safeToAutomate(statusResult.errorType)) {
                showManualSetupInstructions(account, did);
                return;
            }

            let statusMessage = '';
            if (statusResult.error) {
                statusMessage = `<div class="status error">${escapeHtml(statusResult.error)}</div>`;
            }

            contentDiv.innerHTML = `
                ${statusMessage}
                <div class="module">
                    <div class="field">
                        <label>account name</label>
                        <div class="value">${escapeHtml(account)}</div>
                    </div>
                    <div class="field">
                        <label>did:plc identifier</label>
                        <div class="value">${escapeHtml(did)}</div>
                    </div>
                </div>
                <button id="setup-contenthash-btn" class="primary">Set up content hash</button>
                <div id="setup-status"></div>
            `;

            // Add click handler for setup button
            const setupBtn = document.getElementById('setup-contenthash-btn');
            if (setupBtn) {
                setupBtn.addEventListener('click', () => setupContenthash(account, did));
            }
        }

        function showManualSetupInstructions(account, did) {
            contentDiv.innerHTML = `
                <div class="module">
                    <div class="field">
                        <label>account name</label>
                        <div class="value">${escapeHtml(account)}</div>
                    </div>
                    <div class="field">
                        <label>did:plc identifier</label>
                        <div class="value">${escapeHtml(did)}</div>
                    </div>
                </div>
                <div class="module">
                    <div class="field">
                        <label>this domain already points to other content</label>
                        <div class="value value-wrap">
                            Setting up automatically here would replace it, so add this file to your existing site yourself and republish it however you normally do.
                        </div>
                    </div>
                    <div class="field">
                        <label>file path</label>
                        <div class="value">.well-known/atproto-did</div>
                    </div>
                    <div class="field">
                        <label>file contents (exactly this, nothing else)</label>
                        <div class="value">${escapeHtml(did)}</div>
                    </div>
                </div>
                <button id="recheck-btn" class="primary">I've added it — check again</button>
            `;

            const recheckBtn = document.getElementById('recheck-btn');
            if (recheckBtn) {
                recheckBtn.addEventListener('click', () => {
                    contentDiv.innerHTML = `
                        <div class="status loading">Checking domain status...</div>
                    `;
                    checkDomainStatus(account, did);
                });
            }
        }

        function showDifferentAccountWarning(account, expectedDid, existingDid) {
            contentDiv.innerHTML = `
                <div class="status error">This domain already has a different DID published here.</div>
                <div class="module">
                    <div class="field">
                        <label>account name</label>
                        <div class="value">${escapeHtml(account)}</div>
                    </div>
                    <div class="field">
                        <label>did:plc identifier (yours)</label>
                        <div class="value">${escapeHtml(expectedDid)}</div>
                    </div>
                    <div class="field">
                        <label>currently published did (someone else's)</label>
                        <div class="value">${escapeHtml(existingDid)}</div>
                    </div>
                </div>
                <div class="module">
                    <div class="value value-wrap">
                        Continuing will replace it with your DID. Whoever currently controls that account will stop being able to use this domain as their handle - only do this if that's you, or you're intentionally taking over the domain.
                    </div>
                </div>
                <button id="setup-contenthash-btn" class="primary">Continue and replace it</button>
                <div id="setup-status"></div>
            `;

            const setupBtn = document.getElementById('setup-contenthash-btn');
            if (setupBtn) {
                setupBtn.addEventListener('click', () => setupContenthash(account, expectedDid));
            }
        }

        // ENS Registry address (same for Mainnet and Sepolia)
        const ENS_REGISTRY_ADDRESS = '0x00000000000C2E074eC69A0dFb2997BA6C7d2e1e';

        // Minimal ABIs for the contracts we need
        const REGISTRY_ABI = [
            "function resolver(bytes32 node) view returns (address)",
            "function owner(bytes32 node) view returns (address)"
        ];

        const RESOLVER_ABI = [
            "function setContenthash(bytes32 node, bytes hash)"
        ];

        async function setupContenthash(domain, did) {
            const setupBtn = document.getElementById('setup-contenthash-btn');
            const statusDiv = document.getElementById('setup-status');

            try {
                // Check if MetaMask is installed
                if (typeof window.ethereum === 'undefined') {
                    statusDiv.innerHTML = `
                        <div class="status error">MetaMask not found. Please install MetaMask or another Ethereum wallet to continue.</div>
                    `;
                    return;
                }

                // Disable button and show loading
                if (setupBtn) setupBtn.disabled = true;
                statusDiv.innerHTML = `
                    <div class="status loading">Connecting wallet...</div>
                `;

                // Connect to wallet
                const provider = new ethers.BrowserProvider(window.ethereum);
                const signer = await provider.getSigner();
                const network = await provider.getNetwork();

                console.log('Connected to network:', network.name, 'Chain ID:', network.chainId);

                statusDiv.innerHTML = `
                    <div class="status loading">Creating IPFS record...</div>
                `;

                // Step 1: Create and pin the DID file to get IPFS hash
                const ipfsResponse = await fetch(`https://ens.goat.navy/atproto-did/${encodeURIComponent(domain)}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        domain: domain,
                        did: did
                    })
                });

                if (!ipfsResponse.ok) {
                    const errorData = await ipfsResponse.json();
                    throw new Error(errorData.error || 'Failed to create IPFS record');
                }

                const ipfsData = await ipfsResponse.json();
                if (!ipfsData.success || !ipfsData.contenthash || !ipfsData.ipfs_hash) {
                    throw new Error(ipfsData.error || 'Failed to get contenthash from server');
                }

                const ipfsHash = ipfsData.ipfs_hash;
                const contenthash = ipfsData.contenthash;
                console.log('IPFS hash:', ipfsHash);
                console.log('Contenthash from server:', contenthash);

                statusDiv.innerHTML = `
                    <div class="status loading">Getting resolver address...</div>
                `;

                // Step 3: Get the resolver address for the domain
                const registry = new ethers.Contract(ENS_REGISTRY_ADDRESS, REGISTRY_ABI, provider);
                const namehash = ethers.namehash(domain);

                // First check if the domain exists (has an owner)
                const owner = await registry.owner(namehash);
                console.log('Domain owner:', owner);
                console.log('Domain being queried:', domain);
                console.log('Namehash:', namehash);
                console.log('Network:', network.name, 'Chain ID:', network.chainId);

                // Check if domain exists
                const zeroAddr = ethers.ZeroAddress || '0x0000000000000000000000000000000000000000';
                const ownerNormalized = ethers.getAddress ? ethers.getAddress(owner) : owner.toLowerCase();
                const zeroAddrNormalized = ethers.getAddress ? ethers.getAddress(zeroAddr) : zeroAddr.toLowerCase();

                if (ownerNormalized === zeroAddrNormalized) {
                    const networkName = network.name || `Chain ID ${network.chainId}`;
                    const testnetUrl = network.chainId === 11155111n ? 'https://sepolia.app.ens.domains' :
                                      network.chainId === 17000n ? 'https://holesky.app.ens.domains' :
                                      'https://app.ens.domains';
                    throw new Error(
                        `Domain "${domain}" is not registered on ${networkName}.\n\n` +
                        `Please register the domain first:\n` +
                        `1. Go to ${testnetUrl}\n` +
                        `2. Search for "${domain}"\n` +
                        `3. Register the domain if available\n` +
                        `4. Set a resolver in the "Records" tab\n\n` +
                        `Make sure you're on the ${networkName} network.`
                    );
                }

                const resolverAddress = await registry.resolver(namehash);
                console.log('Resolver address (raw):', resolverAddress);
                console.log('Resolver address type:', typeof resolverAddress);

                // Normalize the address using ethers.js
                let normalizedResolverAddress;
                try {
                    // ethers.js v6: getAddress normalizes and validates
                    normalizedResolverAddress = ethers.getAddress(resolverAddress);
                } catch (e) {
                    // Fallback: convert to string and lowercase
                    normalizedResolverAddress = resolverAddress?.toString().toLowerCase() || '';
                }

                // Check if resolver is set (compare with zero address)
                const zeroAddr2 = ethers.ZeroAddress || '0x0000000000000000000000000000000000000000';
                const zeroAddr2Normalized = ethers.getAddress ? ethers.getAddress(zeroAddr2) : zeroAddr2.toLowerCase();

                if (!normalizedResolverAddress || normalizedResolverAddress === zeroAddr2Normalized) {
                    const networkName = network.name || `Chain ID ${network.chainId}`;
                    const testnetUrl = network.chainId === 11155111n ? 'https://sepolia.app.ens.domains' :
                                      network.chainId === 17000n ? 'https://holesky.app.ens.domains' :
                                      'https://app.ens.domains';
                    throw new Error(
                        `No resolver set for this domain on ${networkName}.\n\n` +
                        `Please set a resolver first:\n` +
                        `1. Go to ${testnetUrl}\n` +
                        `2. Search for "${domain}"\n` +
                        `3. Go to the "Records" tab\n` +
                        `4. Set a resolver (you can use the Public Resolver)\n\n` +
                        `Make sure you're on the ${networkName} network when setting the resolver.`
                    );
                }

                console.log('Resolver address (normalized):', normalizedResolverAddress);

                // Use normalized address for the contract
                const finalResolverAddress = normalizedResolverAddress;

                statusDiv.innerHTML = `
                    <div class="status loading">Setting contenthash on blockchain...
                        <small>IPFS: ${escapeHtml(ipfsHash)} (${escapeHtml(contenthash)})</small>
                        <small>Please confirm the transaction in your wallet</small>
                    </div>
                `;

                // Step 4: Set the contenthash on the resolver
                const resolver = new ethers.Contract(finalResolverAddress, RESOLVER_ABI, signer);
                const tx = await resolver.setContenthash(namehash, contenthash);

                statusDiv.innerHTML = `
                    <div class="status loading">Transaction sent! Waiting for confirmation...
                        <small>Transaction hash: ${escapeHtml(tx.hash)}</small>
                    </div>
                `;

                // Wait for transaction confirmation
                const receipt = await tx.wait();

                if (receipt.status === 1) {
                    statusDiv.innerHTML = `
                        <div class="status success">Contenthash set successfully! Confirmed in block ${receipt.blockNumber}.
                            <small>Transaction hash: ${escapeHtml(tx.hash)}</small>
                            <small>Your ENS domain is now configured. It may take a few minutes for the changes to propagate.</small>
                        </div>
                    `;
                    if (setupBtn) setupBtn.style.display = 'none';

                    // Refresh the page status after a short delay
                    setTimeout(() => {
                        checkDomainStatus(account, did);
                    }, 2000);
                } else {
                    throw new Error('Transaction failed');
                }

            } catch (error) {
                console.error('Error setting contenthash:', error);
                statusDiv.innerHTML = `
                    <div class="status error">${escapeHtml(error.message)}</div>
                `;
                if (setupBtn) setupBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
